name: Security Scan Pipeline
on:
  workflow_dispatch:
jobs:
  secrets-scan:
    name: Analyze Secrets with Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source /repo --report-format json --report-path /repo/gitleaks-report.json --exit-code 0
        continue-on-error: true

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: warn

  sast-scan:
    name: Analyze SAST with Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan --config auto --json-output=semgrep-report.json --sarif-output=semgrep-report.sarif .
        continue-on-error: true
      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: |
            semgrep-report.json
            semgrep-report.sarif
          if-no-files-found: warn

  sca-scan:
    name: Analyze SCA with Xygeni
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Xygeni needs more than the default depth of 1 for some scans
          fetch-depth: 0
      - name: Run Xygeni SCA
        uses: xygeni/xygeni-action@v6
        id: Xygeni-Scanner
        with:
          token: ${{ secrets.XYGENI_TOKEN }}
          command: scan --run="deps" --output xygeni-sca-report.json --no-upload --include-vulnerabilities --never-fail
      - name: Upload Xygeni SCA report
        uses: actions/upload-artifact@v4
        with:
          name: deps.xygeni-sca-report
          path: deps.xygeni-sca-report.json
          if-no-files-found: warn

  report-upload:
    name: Consolidate reports in Xygeni
    runs-on: ubuntu-latest
    needs: [secrets-scan, sast-scan, sca-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Gitleaks report
        uses: actions/download-artifact@v4
        with:
          name: gitleaks-report
          path: reports

      - name: Download Semgrep report
        uses: actions/download-artifact@v4
        with:
          name: semgrep-report
          path: reports

      - name: Download Xygeni SCA report
        uses: actions/download-artifact@v4
        with:
          name: deps.xygeni-sca-report
          path: reports

      - name: Upload reports to Xygeni
        uses: xygeni/xygeni-action@v6
        id: Xygeni-Scanner
        with:
          token: ${{ secrets.XYGENI_TOKEN }}
          command: >
            report-upload
            --name="${{ github.repository }}"
            --branch="${{ github.ref_name }}"
            -r reports/gitleaks-report.json -f secrets-gitleaks
            -r reports/semgrep-report.sarif -f sast-sarif
            -r reports/deps.xygeni-sca-report.json -f sca-sarif
            --never-fail

      - name: Update SCM URL in Xygeni
        run: |
          set -euo pipefail

          REPO_NAME="${{ github.repository }}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"

          # 1. Find the project by matching its name against the repository full name
          curl -s -H "Authorization: Bearer ${XYGENI_TOKEN}" \
            "https://api.xygeni.io/allprojects/list?pageSize=200&sortBy=LAST_SCAN:DESC&getCount=true&pageNum=1" \
            -o allprojects.json

          PROJECT_ID=$(jq -r --arg name "$REPO_NAME" \
            '.allProjectListPojo.allProjectPojoList[] | select(.name==$name) | .projectId' \
            allprojects.json | head -n1)

          if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" = "null" ]; then
            echo "::error::No project found in Xygeni matching name '$REPO_NAME'"
            exit 1
          fi

          echo "Found project id: $PROJECT_ID"

          # 2. Fetch current project detail to preserve unrelated fields
          curl -s -H "Authorization: Bearer ${XYGENI_TOKEN}" \
            "https://api.xygeni.io/project/detail/${PROJECT_ID}" \
            -o project-detail.json

          # 3. Build the update payload, changing only scmInfo
          jq -n \
            --slurpfile detail project-detail.json \
            --arg url "$REPO_URL" \
            --arg branch "$BRANCH" \
            '$detail[0] as $d | {
              name: $d.name,
              tags: $d.tags,
              policyId: $d.policyId,
              standardId: $d.standardId,
              scmKind: "github",
              scmInfo: {
                kind: "github",
                url: $url,
                defaultBranch: $branch
              }
            }' > update-payload.json

          cat update-payload.json

          # 4. Push the update
          curl -s -X POST \
            -H "Authorization: Bearer ${XYGENI_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @update-payload.json \
            "https://api.xygeni.io/project/update/${PROJECT_ID}"
        env:
          XYGENI_TOKEN: ${{ secrets.XYGENI_TOKEN }}
