name: Security Scan Pipeline

on:
  workflow_dispatch:

jobs:
  secrets-scan:
    name: Analyze Secrets with Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
 
      - name: Run Gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source /repo --report-format json --report-path /repo/gitleaks-report.json --exit-code 0
        continue-on-error: true
 
      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: warn

  sast-scan:
    name: Analyze SAST with Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan --config auto --json --output semgrep-report.json .
        continue-on-error: true

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json
          if-no-files-found: warn

  sca-scan:
    name: Analyze SCA with Xygeni
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Xygeni needs more than the default depth of 1 for some scans
          fetch-depth: 0

      - name: Run Xygeni SCA
        uses: xygeni/xygeni-action@v6
        id: Xygeni-Scanner
        with:
          token: ${{ secrets.XYGENI_TOKEN }}
          command: scan --run="deps" --output xygeni-sca-report.json --no-upload --include-vulnerabilities --never-fail

      - name: Upload Xygeni SCA report
        uses: actions/upload-artifact@v4
        with:
          name: deps.xygeni-sca-report
          path: deps.xygeni-sca-report.json
          if-no-files-found: warn
