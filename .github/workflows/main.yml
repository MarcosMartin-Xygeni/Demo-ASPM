name: Security Scan Pipeline
on:
  workflow_dispatch:
    inputs:
      run_gitleaks:
        description: "Run Secrets scan (Gitleaks)"
        type: boolean
        default: true
      run_semgrep:
        description: "Run SAST scan (Semgrep)"
        type: boolean
        default: true
      run_xygeni_sca:
        description: "Run SCA scan (Xygeni)"
        type: boolean
        default: true
      update_scm_url:
        description: "Update project SCM URL in Xygeni"
        type: boolean
        default: true
      project_name:
        description: "Project name in Xygeni (leave empty to use the repository name)"
        type: string
        default: ""

jobs:
  secrets-scan:
    name: Analyze Secrets with Gitleaks
    if: ${{ inputs.run_gitleaks }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source /repo --report-format json --report-path /repo/gitleaks-report.json --exit-code 0
        continue-on-error: true

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: warn

  sast-scan:
    name: Analyze SAST with Semgrep
    if: ${{ inputs.run_semgrep }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan --config auto --json-output=semgrep-report.json --sarif-output=semgrep-report.sarif .
        continue-on-error: true
      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: |
            semgrep-report.json
            semgrep-report.sarif
          if-no-files-found: warn

  sca-scan:
    name: Analyze SCA with Xygeni
    if: ${{ inputs.run_xygeni_sca }}
    runs-on: ubuntu-latest
    container:
      image: maven:3.9-eclipse-temurin-17
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Xygeni needs more than the default depth of 1 for some scans
          fetch-depth: 0
      - name: Install unzip
        run: apt-get update && apt-get install -y unzip

      - name: Run Xygeni SCA
        uses: xygeni/xygeni-action@13c6ed2797df7d85749864e2cbcf09c893f43b23 # v6.4.0
        id: Xygeni-Scanner
        with:
          token: ${{ secrets.XYGENI_TOKEN }}
          command: scan --run="deps" --output xygeni-sca-report.json --no-upload --include-vulnerabilities --never-fail
      - name: Upload Xygeni SCA report
        uses: actions/upload-artifact@v4
        with:
          name: deps.xygeni-sca-report
          path: deps.xygeni-sca-report.json
          if-no-files-found: warn

  report-upload:
    name: Consolidate reports in Xygeni
    runs-on: ubuntu-latest
    needs: [secrets-scan, sast-scan, sca-scan]
    # Run even if one or more scan jobs were skipped (unchecked) or failed, as long as the workflow wasn't cancelled
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Gitleaks report
        if: ${{ inputs.run_gitleaks }}
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: gitleaks-report
          path: reports

      - name: Download Semgrep report
        if: ${{ inputs.run_semgrep }}
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: semgrep-report
          path: reports

      - name: Download Xygeni SCA report
        if: ${{ inputs.run_xygeni_sca }}
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: deps.xygeni-sca-report
          path: reports

      - name: Build report-upload arguments
        id: build_args
        run: |
          ARGS=""
          if [ -f reports/gitleaks-report.json ]; then
            ARGS="$ARGS -r reports/gitleaks-report.json -f secrets-gitleaks"
          fi
          if [ -f reports/semgrep-report.sarif ]; then
            ARGS="$ARGS -r reports/semgrep-report.sarif -f sast-sarif"
          fi
          if [ -f reports/deps.xygeni-sca-report.json ]; then
            ARGS="$ARGS -r reports/deps.xygeni-sca-report.json"
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Upload reports to Xygeni
        if: ${{ steps.build_args.outputs.args != '' }}
        uses: xygeni/xygeni-action@13c6ed2797df7d85749864e2cbcf09c893f43b23 # v6.4.0
        id: Xygeni-Scanner
        with:
          token: ${{ secrets.XYGENI_TOKEN }}
          command: >
            report-upload
            --name="${{ inputs.project_name || github.repository }}"
            --branch="${{ github.ref_name }}"
            ${{ steps.build_args.outputs.args }}
            --never-fail

      - name: Update SCM URL in Xygeni
        if: ${{ inputs.update_scm_url }}
        run: |
          set -euo pipefail

          REPO_NAME="${{ inputs.project_name || github.repository }}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"

          # 1. Find the project by matching its name against the configured project name
          curl -s -H "Authorization: Bearer ${XYGENI_TOKEN}" \
            "https://api.xygeni.io/allprojects/list?pageSize=200&sortBy=LAST_SCAN:DESC&getCount=true&pageNum=1" \
            -o allprojects.json

          PROJECT_ID=$(jq -r --arg name "$REPO_NAME" \
            '.allProjectListPojo.allProjectPojoList[] | select(.name==$name) | .projectId' \
            allprojects.json | head -n1)

          if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" = "null" ]; then
            echo "::error::No project found in Xygeni matching name '$REPO_NAME'"
            exit 1
          fi

          echo "Found project id: $PROJECT_ID"

          # 2. Fetch current project detail to preserve unrelated fields
          curl -s -H "Authorization: Bearer ${XYGENI_TOKEN}" \
            "https://api.xygeni.io/project/detail/${PROJECT_ID}" \
            -o project-detail.json

          # 3. Build the update payload, changing only scmInfo
          jq -n \
            --slurpfile detail project-detail.json \
            --arg url "$REPO_URL" \
            --arg branch "$BRANCH" \
            '$detail[0] as $d | {
              name: $d.name,
              tags: $d.tags,
              policyId: $d.policyId,
              standardId: $d.standardId,
              scmKind: "github",
              scmInfo: {
                kind: "github",
                url: $url,
                defaultBranch: $branch
              }
            }' > update-payload.json

          cat update-payload.json

          # 4. Push the update
          curl -s -X POST \
            -H "Authorization: Bearer ${XYGENI_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @update-payload.json \
            "https://api.xygeni.io/project/update/${PROJECT_ID}"
        env:
          XYGENI_TOKEN: ${{ secrets.XYGENI_TOKEN }}
